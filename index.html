        function generateCodeStr() {
            let code = "";
            clips.sort((a,b)=>a.start-b.start).forEach(c => {
                let m = c.mirror ? 'm' : '';
                let s = Math.min(999, Math.round(c.start*100)).toString().padStart(3,'0');
                let b = parseInt(c.bright).toString().padStart(2,'0');
                
                let d = Math.max(1, Math.min(999, Math.round(c.duration*100))).toString().padStart(3,'0');
                
                code += `${m}(${s}${b},${compressLEDs(c.target || 'a')},${c.color},${c.fx}${d}00)`;
            });
            return code;
        }
        
        function updateLoopLine() {

            let beatTime = 60 / editorBPM;
            if (maxT > 0) {
                currentLoopLimit = Math.ceil((maxT - 0.005) / beatTime) * beatTime;
                if (currentLoopLimit <= 0) currentLoopLimit = beatTime;
            } else {

        function addClipAtBestGap() { 
            const id = Date.now(); 
            let beatTime = 60 / editorBPM; 
            
            let bestGap = null;
            let maxGapWidth = -1;

            for (let t = 0; t <= 7; t++) {
                let trackClips = clips.filter(c => c.track === t).sort((a, b) => a.start - b.start);
                let currentPos = 0;
                
                trackClips.forEach(c => {
                    let gapWidth = c.start - currentPos;
                    if (gapWidth >= beatTime && gapWidth > maxGapWidth) {
                        maxGapWidth = gapWidth;
                        bestGap = { track: t, start: currentPos };
                    }
                    currentPos = Math.max(currentPos, c.start + c.duration);
                });
                
                let endGapWidth = currentLoopLimit - currentPos;
                if (endGapWidth >= beatTime && endGapWidth > maxGapWidth) {
                    maxGapWidth = endGapWidth;
                    bestGap = { track: t, start: currentPos };
                }
            }

            let spawnStart = 0;
            let spawnTrack = 0;

            if (bestGap) {
                spawnStart = bestGap.start;
                spawnTrack = bestGap.track;
            } else {
                spawnStart = 0; 
                spawnTrack = Math.floor(Math.random() * 8); 
            }

            clips.push({ 
                id, 
                start: spawnStart, 
                duration: beatTime, 
                target: "", 
                color: "bl", 
                fx: "v", 
                bright: 10, 
                loop: 1, 
                mirror: false, 
                track: spawnTrack 
            }); 
            
            markUnsaved(); 
            renderClips(); 
            selectClip(id); 
            
            setTimeout(() => {
                let newEl = document.getElementById(`clip-${id}`);
                if (newEl) {
                    newEl.classList.add('new-clip-blink');
                    setTimeout(() => newEl.classList.remove('new-clip-blink'), 1200);
                }
            }, 50);
        }

       function sendFullCodeToBT() { 
            if(!characteristic) return;

        let lastSentOff = false;

        function scrubLiveFrame() { 
            if(!characteristic || isPlaying) return; 
            
          // เติมบรรทัดนี้ลงไปครับ! ดักไม่ให้มันแอบส่งคำสั่ง off ตอนที่เราไม่ได้เปิดหน้าต่าง Edit
            if(document.getElementById('modal').classList.contains('hidden')) return; 

            let activeClips = clips.filter(c => playheadTime >= c.start && playheadTime <= c.start + c.duration);
            if (activeClips.length === 0) {
                if (!lastSentOff) {
                    throttledBleWrite('scrub', (activeLayer === 'BG') ? "off" : (activeLayer === 'FG' ? "FG:off" : "SP:off"), 'withoutResponse', 40);
                    lastSentOff = true;
                }
                return;
            }
            lastSentOff = false;
            let code = (activeLayer === 'BG') ? "5" : (activeLayer === 'FG' ? "FG:5" : "SP:5");
            activeClips.forEach(c => {
                let p = (playheadTime - c.start) / c.duration;
                if(p < 0) p = 0; if(p > 1) p = 1;
                let f = 1.0;
                if (c.fx === 'u') f = p;
                else if (c.fx === 'f') f = 1.0 - p;
                else if (c.fx === 'w') f = 0.3 + (0.7 * Math.sin(Math.PI * p));
                else if (c.fx === 'p') f = Math.pow(Math.sin(Math.PI * p), 4);
                else if (c.fx === 'd') f = Math.pow(1.0 - p, 4);
                else if (c.fx === 'z') f = 1.0 - ((p * 4.0) % 1.0);
                else if (c.fx === 'v') f = Math.sin(Math.PI * p);
                let br = Math.max(0, Math.min(99, Math.round(c.bright * f)));
                let bStr = br.toString().padStart(2, '0');
                let m = c.mirror ? 'm' : '';
                let colorCodes = c.color.split('2');
                let step = 1.0 / (colorCodes.length > 1 ? colorCodes.length - 1 : 1);
                let idx = Math.floor(p / step);
                if (idx >= colorCodes.length) idx = colorCodes.length - 1;
                let showColor = colorCodes[idx] || colorCodes[0];
                code += `${m}(000${bStr},${compressLEDs(c.target || 'a')},${showColor},o99900)`; 
            });
            throttledBleWrite('scrub', code, 'withoutResponse', 40);
        }

                canvas.classList.add('hidden');          
                titleText.classList.remove('hidden');    
                camBtn.classList.remove('border-teal-500', 'shadow-[0_0_15px_#0d9488]');
                camBtn.classList.add('border-gray-700'); 
                if (camera) { camera.stop(); }
                return;
            }

            if (typeof Hands === 'undefined') {
                alert("กำลังโหลดระบบ AI กรุณารอสักครู่แล้วกดใหม่ครับ");
                return;
            }

            isCamTapActive = true;
            titleText.classList.add('hidden');       
            canvas.classList.remove('hidden');       
            camBtn.classList.remove('border-gray-700');
            camBtn.classList.add('border-teal-500', 'shadow-[0_0_15px_#0d9488]'); 

            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, 
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                const ctx = canvas.getContext('2d');
                
                if (canvas.width !== results.image.width) {
                    canvas.width = results.image.width;
                    canvas.height = results.image.height;
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    // เปลี่ยนเป้าหมายจาก "ข้อมือ" มาเป็น "ปลายนิ้วชี้" (จุดที่ 8 ของ AI) เพราะเคลื่อนที่ไวกว่า
                    const indexTip = landmarks[8]; 
                    
                    // วาดจุดติดตามบนจอพรีวิวที่ปลายนิ้วชี้
                    ctx.fillStyle = "#00e676";
                    ctx.beginPath();
                    ctx.arc(indexTip.x * canvas.width, indexTip.y * canvas.height, 6, 0, 2 * Math.PI);
                    ctx.fill();

                    // คำนวณความเร็วในการสะบัดนิ้วชี้ลง
                    if (lastWristY !== 0) {
                        let deltaY = indexTip.y - lastWristY;
                        let now = Date.now();
                        
                        // ปรับจูน: ใช้ระยะสะบัดแค่นิดเดียว (> 0.045) และลดตัวกันกดเบิ้ลเหลือ 200ms
                        if (deltaY > 0.045 && (now - lastHandTapTime > 200)) {
                            lastHandTapTime = now;
                            ctx.fillStyle = "rgba(255, 61, 0, 0.5)";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            remoteTapTempo(null); 
                        }
                    }
                    lastWristY = indexTip.y; // เก็บค่าตำแหน่งนิ้วไว้เทียบกับเฟรมถัดไป
                } else {
                    // ถ้ามือออกนอกกล้อง ให้รีเซ็ตตำแหน่งนิ้ว เพื่อไม่ให้ตอนเอามือเข้ามาใหม่ AI มองว่าเป็นการสะบัด
                    lastWristY = 0;
                }
            });

            camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 320, height: 240, facingMode: "user" 
            });
            camera.start();
        }
        // --- จบระบบ AI ---
        window.onload = () => {
            try {
                history.pushState(null, null, window.location.pathname);
                renderPads();
                let fixedBeatTime = 60 / editorBPM; 
                let beatPx = Math.max(1, fixedBeatTime * pxPerSec); 
                let secPx = Math.max(1, 1.0 * pxPerSec); 
                document.getElementById('timelineContent').style.backgroundImage = 
                    `linear-gradient(to right, rgba(255, 61, 0, 0.7) 2px, transparent 2px), 
                     linear-gradient(to right, rgba(255, 255, 255, 0.15) 1px, transparent 1px)`;
                document.getElementById('timelineContent').style.backgroundSize = `${beatPx}px 100%, ${secPx}px 100%`;
                
                updateBeatDuration(); 

                let initialPxPerSec = pxPerSec;
                interact('#timelineViewport').gesturable({
                    listeners: {
                        start(event) { initialPxPerSec = pxPerSec; },
                        move(event) {
                            let newPx = initialPxPerSec * event.scale;
                            newPx = Math.max(20, Math.min(300, newPx));
                            updateZoom(newPx);
                        }
                    }
                });

                interact('#editorBpmDisplay').on('hold', function (event) {
                    let input = prompt("ตั้งค่า Tempo (BPM) ใหม่สำหรับหน้า Edit:", editorBPM);
                    if (input !== null) {
                        let bpm = parseInt(input);
                        if (!isNaN(bpm) && bpm >= 30 && bpm <= 200) {
                            editorBPM = bpm;
                            document.getElementById('editorBpmDisplay').innerText = editorBPM;
                            document.getElementById('liveBpmDisplay').innerText = editorBPM;
                            updateBeatDuration();
                            updateGridBackground();
                            snapLoopToGrid(); 
                            fitToScreen(); 
                            restartPlayhead();
                        } else {
                            alert("กรุณาใส่ตัวเลขระหว่าง 30 - 200");
                        }
                    }
                });
                
                interact('#liveBpmDisplay').on('hold', function (event) {
                    let input = prompt("ตั้งค่า Tempo (BPM) ใหม่สำหรับหน้า Live BG:", editorBPM);
                    if (input !== null) {
                        let bpm = parseInt(input);
                        if (!isNaN(bpm) && bpm >= 30 && bpm <= 200) {
                            editorBPM = bpm;
                            document.getElementById('editorBpmDisplay').innerText = editorBPM;
                            document.getElementById('liveBpmDisplay').innerText = editorBPM;
                            updateBeatDuration(); 
                            remoteEditAction('BG', () => { snapLoopToGrid(); });
                        } else {
                            alert("กรุณาใส่ตัวเลขระหว่าง 30 - 200");
                        }
                    }
                });
            } catch (err) { alert("เกิดข้อผิดพลาด: " + err.message); }
        };
    </script>
</body>
</html>
