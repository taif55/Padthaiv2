<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket DJ Studio - 2 Layers Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- เพิ่มไลบรารีจับภาพมือของ Google MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        :root {
            /* ค่าตั้งต้นสำหรับจังหวะกระพริบ (128 BPM = 0.468s) */
            --beat-duration: 0.468s;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background: #050505; color: white; 
            user-select: none; overflow: hidden; height: 100dvh; 
            display: flex; flex-direction: column; touch-action: none; 
            margin: 0; padding: 0;
        }

        #mainView {
            display: flex;
            flex-direction: column;
            height: calc(100dvh - 5px); 
            overflow: hidden; 
            padding: 5px 5px 5px 5px; 
            box-sizing: border-box;
            gap: 5px;
        }

        .header-section {
            flex: 0 0 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.5);
            padding: 0 15px;
            border-radius: 15px;
            border: 1px solid #1f2937;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .power-bar-container {
            width: 60px;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
            position: relative;
        }
        .power-bar-fill {
            height: 100%;
            width: 0%; 
            background-color: #22c55e; 
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .power-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 8px;
            font-weight: 900;
            line-height: 12px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

       .layer-block {
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            padding: 10px;
            position: relative;
            background-color: rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
       .layer-bg { 
            flex: 1; min-h-0;
            border: 2px solid #22c55e; 
            background-color: rgba(20, 83, 45, 0.2); 
        }
        
        .layer-fg { 
            flex: 1; min-h-0;
            border: 2px solid #3b82f6; 
            background-color: rgba(30, 58, 138, 0.2); 
        }

        .layer-sp { 
            flex: 1; min-h-0;
            border: 2px solid #ec4899; 
            background-color: rgba(157, 23, 77, 0.2); 
        }
        .layer-title {
            position: absolute;
            top: -10px;
            left: 15px;
            background-color: #050505;
            padding: 0 10px;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .pad-container { 
            flex: 1; 
            width: 100%; 
            overflow-y: scroll; 
            overflow-x: hidden; /* เพิ่มบรรทัดนี้: ล็อคแกนนอน ป้องกันปุ่มพองตัวไปกวน Scrollbar */
            padding: 5px; 
            touch-action: pan-y; 
            margin-bottom: 5px;
        }
        
        .pad-container::-webkit-scrollbar { display: block; width: 8px; }
        .pad-container::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 4px; }
        .pad-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; border: 2px solid #0a0a0a; }

       .grid-style { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        .pad-btn { background: #151515; border: 1px solid #333; aspect-ratio: 3/2; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: transform 0.05s, box-shadow 0.1s; }
        .pad-btn:active { transform: scale(0.92); box-shadow: inset 0 0 15px rgba(255,255,255,0.2); }
        .pad-btn.playing { box-shadow: 0 0 20px #fff; border-color: #fff; background: #fff !important; color: black; }
        .pad-btn.has-code { border: 2px solid #555; background-color: #151515 !important; }

        .sortable-drag { opacity: 1 !important; transform: scale(1.1) !important; z-index: 9999 !important; box-shadow: 0 10px 30px #000 !important; border: 2px solid #fff !important; pointer-events: none; }
        .sortable-ghost { opacity: 0.1; background: #fff !important; }

        #timelineViewport { background: #0a0a0a; border-bottom: 1px solid #222; position: relative; height: 180px; overflow-x: auto; overflow-y: hidden; scroll-behavior: auto; touch-action: pan-x pinch-zoom; }
        #timelineContent { position: relative; height: 100%; width: 2000px; transform-origin: left top; }
        
        #playhead { position: absolute; top: 0; width: 2px; height: 100%; background: #ff3d00; z-index: 50; pointer-events: none; box-shadow: 0 0 8px #ff3d00; }
        #loopLine { position: absolute; top: 0; width: 2px; height: 100%; background: #00e676; z-index: 45; pointer-events: none; box-shadow: 0 0 10px #00e676; opacity: 0.8; }
        
        .light-clip { position: absolute; height: 16px; color: black; border-radius: 4px; font-size: 8px; font-weight: 900; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; border: 1px solid rgba(255,255,255,0.4); cursor: grab; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .light-clip:active { cursor: grabbing; }
        .light-clip.selected { border: 2px solid white; box-shadow: 0 0 10px #00e676; z-index: 40; }
        
        .color-scroll::-webkit-scrollbar { height: 4px; }
        .color-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        #ledGrid { touch-action: pan-y; padding-right: 5px; overflow-y: auto; }
        #ledGrid::-webkit-scrollbar { display: block; width: 14px; }
        #ledGrid::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 8px; }
        #ledGrid::-webkit-scrollbar-thumb { background: #333; border-radius: 8px; border: 3px solid #0a0a0a; }

        .led-mark { border: 1px solid #444 !important; background: #151515; }
        .led-active { background: #00e676 !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 8px #00e676; }
        
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(3px); }

        /* อนิเมชั่นกระพริบตามจังหวะ BPM */
        @keyframes bpmSyncBlink {
            0% { background-color: #fff !important; color: #000 !important; box-shadow: 0 0 15px #fff; transform: scale(1.1); border-color: #fff !important; z-index: 10; }
            30% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        .sync-blink {
            animation: bpmSyncBlink var(--beat-duration, 0.5s) infinite;
            position: relative;
        }
        .sync-blink-fg { animation: bpmSyncBlink var(--beat-duration, 0.5s) infinite; position: relative; }
        .sync-blink-sp { animation: bpmSyncBlink var(--beat-duration, 0.5s) infinite; position: relative; }

        /* NEW: อนิเมชั่นกระพริบชี้เป้าเวลาก้อนไฟเกิดใหม่ (Add Clip) */
        @keyframes newClipFlash {
            0%, 100% { box-shadow: 0 0 0px #00e676; border-color: rgba(255,255,255,0.4); }
            50% { box-shadow: 0 0 25px #00e676 !important; border-color: #00e676 !important; background-color: #fff !important; color: black !important; z-index: 60; transform: scale(1.15); }
        }
        .new-clip-blink {
            animation: newClipFlash 0.4s ease-in-out 3 !important;
        }
    </style>
</head>

<body>
    <div id="mainView">
        
       <div class="header-section mt-1 mb-1 !flex-none !py-2 flex justify-between items-center w-full gap-1">
            
            <!-- ====== กรอบกลุ่ม 1: ฝั่งซ้าย (ตั้งค่า + กล้อง) ====== -->
            <div class="flex items-center gap-2 shrink-0 min-w-0">
                <!-- แก๊งตั้งค่า (Power, Connect, Setting) -->
                <div class="flex flex-col items-center gap-1 w-[60px] shrink-0">
                    <!-- แถบแสดงแบตเตอรี่ -->
                    <div class="flex flex-col items-center w-full">
                        <span id="powerLabel" class="text-[7px] text-gray-400 font-bold mb-[1px] leading-none">POWER</span>
                        <div class="power-bar-container !w-full">
                            <div id="powerBarFill" class="power-bar-fill"></div>
                            <div id="powerBarText" class="power-text">OFF</div>
                        </div>
                    </div>
                    
                    <!-- ปุ่มเชื่อมต่อบลูทูธ -->
                    <button id="connectBtn" class="bg-blue-600 text-white text-[9px] font-black w-full py-1 rounded-xl active:scale-95 transition animate-pulse shadow-[0_0_10px_rgba(37,99,235,0.5)] leading-tight">CONNECT</button>
                    
                    <!-- ปุ่ม Setting -->
                    <button id="settingBtn" class="bg-gray-800 text-white text-[12px] font-black w-full py-0.5 rounded-xl border border-gray-600 shadow-[0_0_8px_rgba(0,0,0,0.5)] active:scale-95 transition flex items-center justify-center cursor-pointer">
                        ⚙️
                    </button>
                </div>

                <!-- กล้อง AI / ปุ่มโลโก้ (ใส่ shrink ให้มันหดตัวได้เมื่อโดนบีบ) -->
                <button id="camToggleBtn" onclick="toggleCameraTap()" class="relative w-28 max-w-[112px] h-[4.5rem] bg-gray-900 border-2 border-gray-700 rounded-xl overflow-hidden shadow-inner shrink transition flex items-center justify-center min-w-[50px]">
                    <div id="titleText" class="text-[11px] font-black text-white italic uppercase tracking-wider text-center leading-tight drop-shadow-md">
                        Pocket DJ<br><span class="text-orange-500">PADTHAI</span>
                    </div>
                    <!-- วิดีโอและจอพรีวิวซ่อนอยู่ข้างหลังข้อความ -->
                    <canvas id="outputCanvas" class="absolute inset-0 w-full h-full object-cover hidden" style="transform: scaleX(-1);"></canvas>
                </button>
                <video id="inputVideo" class="hidden" autoplay playsinline></video>
            </div>

            <!-- ====== กรอบกลุ่ม 2: ฝั่งขวา (คุมจังหวะ) ====== -->
            <!-- ล็อกกล่องนี้ด้วย shrink-0 ไม่ให้หดไปทับกล้อง -->
            <div class="flex flex-col items-end justify-between h-[4.5rem] py-0.5 shrink-0">
                <!-- แถวบน: พื้นที่ว่างเผื่ออนาคต -->
                <div class="flex items-center w-full justify-end h-[20px]">
                    <div class="flex items-center space-x-1 shrink-0">
                        <button onclick="globalShiftRoom(-1)" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded-lg border border-gray-600 text-[10px] font-black shadow-[0_0_8px_rgba(0,0,0,0.5)] active:scale-95 transition flex items-center gap-1">
                            <span class="text-[12px] text-green-500">◀</span> SLOW
                        </button>
                        <button onclick="globalShiftRoom(1)" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded-lg border border-gray-600 text-[10px] font-black shadow-[0_0_8px_rgba(0,0,0,0.5)] active:scale-95 transition flex items-center gap-1">
                            FAST <span class="text-[12px] text-red-500">▶</span>
                        </button>
                    </div>
                </div>
                <!-- แถวล่าง: กลุ่มปุ่มจังหวะ (END, BPM, TAP) -->
                <div class="flex items-center space-x-1 justify-end shrink-0 w-full mt-1">
                    <button id="endSongBtn" onclick="triggerEndSong()" class="bg-purple-600 hover:bg-purple-500 text-white px-2 py-1.5 rounded-lg text-[9px] font-black shadow-[0_0_8px_rgba(147,51,234,0.4)] active:scale-95 transition flex items-center justify-center shrink-0 tracking-widest">END</button>
                    
                    <!-- เปลี่ยนสีตัวเลข BPM จากส้มเป็นสีขาว (text-white) ตรงนี้ครับ -->
                    <!-- เพิ่ม ondblclick="toggleAutoBeat()" และเอฟเฟกต์ Transition -->
                    <span id="liveBpmDisplay" ondblclick="toggleAutoBeat()" class="text-[13px] text-white font-black px-2 py-1 rounded-lg border border-gray-700 bg-gray-800 cursor-pointer shrink-0 text-center shadow-inner transition-all duration-75" title="ดับเบิลคลิกเพื่อเปิดโหมด Auto Beat">128</span>
                    
                    <button id="bgTapBtn" onpointerdown="remoteTapTempo(event)" class="bg-orange-600 hover:bg-orange-500 text-white px-2.5 py-1.5 rounded-lg text-[10px] font-black shadow-[0_0_8px_rgba(234,88,12,0.4)] active:scale-95 transition flex items-center justify-center shrink-0">TAP</button>
                </div>
            </div>
            
        </div>
        <div class="layer-block layer-bg mt-1">
            <h2 class="layer-title text-green-500">BACKGROUND LAYER</h2>
            
       <div class="grid grid-cols-8 gap-1 px-1 mt-3 mb-1 flex-none">
                <button id="stopBtnBG" onclick="stopBG()" class="bg-red-900/80 hover:bg-red-600 text-white font-black text-[10px] py-1 rounded-lg shadow-lg transition">STOP</button>
                <button onclick="setRoomFromBtn(this, 8, 0)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">8</button>
                <button onclick="setRoomFromBtn(this, 6, 1)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">6</button>
                <button onclick="setRoomFromBtn(this, 4, 2)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">4</button>
                <button onclick="setRoomFromBtn(this, 2, 3)" class="room-btn bg-green-700 text-white py-1 rounded-lg border border-green-500 text-[11px] font-black active:bg-green-600 transition shadow-[0_0_8px_rgba(34,197,94,0.6)] sync-blink">2</button>
                <button onclick="setRoomFromBtn(this, 1, 4)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1</button>
                <button onclick="setRoomFromBtn(this, 0.5, 5)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/2</button>
                <button onclick="setRoomFromBtn(this, 0.25, 6)" class="room-btn bg-gray-800 text-green-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/4</button>
            </div>

            <div class="grid grid-cols-8 gap-1 px-1 flex-1 min-h-0 pb-1">
                <div class="col-span-1 flex flex-col items-center bg-gray-900/50 py-1.5 rounded-xl border border-gray-800 shadow-inner min-h-0 h-full">
                    <span class="text-[7px] text-gray-400 font-bold mb-1 flex-none">BRT</span>
                    <input type="range" orient="vertical" id="bgBrightSlider" min="0" max="0.30" step="0.01" value="0.30" class="flex-1 w-2 min-h-0 accent-yellow-500 bg-gray-700 rounded-lg cursor-pointer" style="-webkit-appearance: slider-vertical; appearance: slider-vertical;" oninput="updateBright(this.value, 'BG')">
                </div>

                <div class="col-span-7 flex flex-col min-w-0 gap-1 min-h-0 h-full">
                    <div class="flex items-center bg-gray-900/50 px-2 py-1.5 rounded-lg border border-gray-700 shadow-inner flex-none">
                        <input type="range" id="liveSpeedSlider" min="0" max="6" step="0.01" value="3"
                               class="flex-1 accent-orange-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" 
                               onpointerdown="startDragSCL()" 
                               oninput="dragSCL(this.value)" 
                               onchange="dropSCL(this.value)">
                    </div>
                    
                    <div class="pad-container !mb-0 !mt-0 !p-0 pr-1 overflow-y-auto flex-1 min-h-0">
                        <div id="padGridBG" class="grid-style"></div>
                    </div>
                </div>
            </div>
            </div>
       <div class="layer-block layer-fg mt-1">
            <h2 class="layer-title text-blue-500">FOREGROUND LAYER</h2>
            
            <div class="grid grid-cols-8 gap-1 px-1 mt-3 mb-1 flex-none">
                <button id="stopBtnFG" onclick="stopFG()" class="bg-red-900/80 hover:bg-red-600 text-white font-black text-[10px] py-1 rounded-lg shadow-lg transition">STOP</button>
                <button onclick="setRoomFromBtnFG(this, 8, 0)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">8</button>
                <button onclick="setRoomFromBtnFG(this, 6, 1)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">6</button>
                <button onclick="setRoomFromBtnFG(this, 4, 2)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">4</button>
                <button onclick="setRoomFromBtnFG(this, 2, 3)" class="room-btn-fg bg-blue-700 text-white py-1 rounded-lg border border-blue-500 text-[11px] font-black active:bg-blue-600 transition shadow-[0_0_8px_rgba(59,130,246,0.6)] sync-blink-fg">2</button>
                <button onclick="setRoomFromBtnFG(this, 1, 4)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1</button>
                <button onclick="setRoomFromBtnFG(this, 0.5, 5)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/2</button>
                <button onclick="setRoomFromBtnFG(this, 0.25, 6)" class="room-btn-fg bg-gray-800 text-blue-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/4</button>
            </div>

            <div class="grid grid-cols-8 gap-1 px-1 flex-1 min-h-0 pb-1">
                <div class="col-span-1 flex flex-col items-center bg-gray-900/50 py-1.5 rounded-xl border border-gray-800 shadow-inner min-h-0 h-full">
                    <span class="text-[7px] text-gray-400 font-bold mb-1 flex-none">BRT</span>
                    <input type="range" orient="vertical" id="fgBrightSlider" min="0" max="0.30" step="0.01" value="0.30" class="flex-1 w-2 min-h-0 accent-yellow-500 bg-gray-700 rounded-lg cursor-pointer" style="-webkit-appearance: slider-vertical; appearance: slider-vertical;" oninput="updateBright(this.value, 'FG')">
                </div>

                <div class="col-span-7 flex flex-col min-w-0 gap-1 min-h-0 h-full">
                    <div class="flex items-center bg-gray-900/50 px-2 py-1.5 rounded-lg border border-gray-700 shadow-inner flex-none">
                        <input type="range" id="liveSpeedSliderFG" min="0" max="6" step="0.01" value="3"
                               class="flex-1 accent-blue-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" 
                               onpointerdown="startDragSCLFG()" 
                               oninput="dragSCLFG(this.value)" 
                               onchange="dropSCLFG(this.value)">
                    </div>
                    
                    <div class="pad-container !mb-0 !mt-0 !p-0 pr-1 overflow-y-auto flex-1 min-h-0">
                        <div id="padGridFG" class="grid-style"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="layer-block layer-sp mt-1">
            <h2 class="layer-title text-pink-500">SPECIAL FX LAYER</h2>
            
            <div class="grid grid-cols-8 gap-1 px-1 mt-3 mb-1 flex-none">
                <button id="stopBtnSP" onclick="stopSP()" class="bg-red-900/80 hover:bg-red-600 text-white font-black text-[10px] py-1 rounded-lg shadow-lg transition">STOP</button>
                <button onclick="setRoomFromBtnSP(this, 8, 0)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">8</button>
                <button onclick="setRoomFromBtnSP(this, 6, 1)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">6</button>
                <button onclick="setRoomFromBtnSP(this, 4, 2)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">4</button>
                <button onclick="setRoomFromBtnSP(this, 2, 3)" class="room-btn-sp bg-pink-700 text-white py-1 rounded-lg border border-pink-500 text-[11px] font-black active:bg-pink-600 transition shadow-[0_0_8px_rgba(236,72,153,0.6)] sync-blink-sp">2</button>
                <button onclick="setRoomFromBtnSP(this, 1, 4)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1</button>
                <button onclick="setRoomFromBtnSP(this, 0.5, 5)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/2</button>
                <button onclick="setRoomFromBtnSP(this, 0.25, 6)" class="room-btn-sp bg-gray-800 text-pink-400 py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition">1/4</button>
            </div>

            <div class="grid grid-cols-8 gap-1 px-1 flex-1 min-h-0 pb-1">
                <div class="col-span-1 flex flex-col items-center bg-gray-900/50 py-1.5 rounded-xl border border-gray-800 shadow-inner min-h-0 h-full">
                    <span class="text-[7px] text-gray-400 font-bold mb-1 flex-none">BRT</span>
                    <input type="range" orient="vertical" id="spBrightSlider" min="0" max="0.30" step="0.01" value="0.30" class="flex-1 w-2 min-h-0 accent-yellow-500 bg-gray-700 rounded-lg cursor-pointer" style="-webkit-appearance: slider-vertical; appearance: slider-vertical;" oninput="updateBright(this.value, 'SP')">
                </div>

                <div class="col-span-7 flex flex-col min-w-0 gap-1 min-h-0 h-full">
                    <div class="flex items-center bg-gray-900/50 px-2 py-1.5 rounded-lg border border-gray-700 shadow-inner flex-none">
                        <input type="range" id="liveSpeedSliderSP" min="0" max="6" step="0.01" value="3"
                               class="flex-1 accent-pink-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" 
                               onpointerdown="startDragSCLSP()" 
                               oninput="dragSCLSP(this.value)" 
                               onchange="dropSCLSP(this.value)">
                    </div>

    <script>
        let device, characteristic;
        let bleQueue = [];
        let isBleWriting = false;
        let bleThrottleTimers = {};

        let bleRxBuffer = ""; // --- เพิ่มตัวแปรตะกร้าพักข้อมูล Bluetooth ---

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastLowVoltAlertTime = 0; 
        let isLowVoltageAlertLocked = false; 

        function playAlertBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'square'; 
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain1.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc1.start(); osc1.stop(audioCtx.currentTime + 0.2);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.start(); osc2.stop(audioCtx.currentTime + 0.2);
            }, 250);
        }

        async function processBleQueue() {
            if (isBleWriting || bleQueue.length === 0 || !characteristic) return;
            isBleWriting = true;
            
            while (bleQueue.length > 0) {
                let item = bleQueue.shift();
                let { cmd, type, retries, resolve, reject } = item;
                
                if (!characteristic || !device || !device.gatt.connected) {
                    if(reject) reject(new Error("Disconnected"));
                    bleQueue = []; 
                    break;
                }

                try {
                    let fullStr = cmd + '\n';
                    let chunkSize = 20; // หั่นข้อมูลส่งทีละ 20 ตัวอักษรให้พอดีหลอดลม Bluetooth
                    
                    for (let i = 0; i < fullStr.length; i += chunkSize) {
                        let chunk = fullStr.substring(i, i + chunkSize);
                        let encoded = new TextEncoder().encode(chunk);
                        
                        let writePromise = type === 'withResponse' 
                            ? characteristic.writeValue(encoded)
                            : characteristic.writeValueWithoutResponse(encoded);
                            
                        let timeoutPromise = new Promise((_, rej) => setTimeout(() => rej(new Error("BLE Timeout")), 1500));
                        
                        await Promise.race([writePromise, timeoutPromise]);
                        await new Promise(r => setTimeout(r, 25)); // พักหายใจ 25ms ให้ ESP32 กลืนข้อมูลทัน
                    }
                    if(resolve) resolve();
                } catch (e) {
                    console.warn("BLE Write Error:", cmd, e);
                    
                    if (retries > 0) {
                        item.retries -= 1;
                        bleQueue.unshift(item);
                        await new Promise(r => setTimeout(r, 100));
                        continue; 
                    } else {
                        if (cmd.startsWith("SB") || cmd.startsWith("SF") || cmd.startsWith("SSP") || cmd.startsWith("OBG") || cmd.startsWith("OFG") || cmd.startsWith("OSP")) {
                            alert("⚠️ บลูทูธไม่ตอบสนอง บันทึกข้อมูลไม่สำเร็จ กรุณากด SAVE อีกครั้งครับ");
                        }
                        if(reject) reject(e);
                    }
                }
                
                await new Promise(r => setTimeout(r, 20)); 
            }
            
            isBleWriting = false;
        }

        function safeBleWrite(cmd, type = 'withoutResponse', retries = -1) {
            return new Promise((resolve, reject) => {
                if (bleQueue.length > 30) bleQueue.shift(); 
                
                let actualRetries = retries !== -1 ? retries : (type === 'withResponse' ? 3 : 0);
                
                bleQueue.push({ cmd, type, retries: actualRetries, resolve, reject });
                processBleQueue();
            });
        }

        function throttledBleWrite(key, cmd, type = 'withoutResponse', delay = 50) {
            if (bleThrottleTimers[key]) clearTimeout(bleThrottleTimers[key]);
            bleThrottleTimers[key] = setTimeout(() => {
                safeBleWrite(cmd, type);
            }, delay);
        }

       function onDisconnected() { 
            characteristic = null; 
            isBleWriting = false; 
            bleQueue = []; 
            bleRxBuffer = ""; // --- เคลียร์ข้อมูลเก่าค้างท่อทิ้ง ---
            
            const btn = document.getElementById('connectBtn'); 
            btn.innerText = "CONNECT"; 
            btn.className = "bg-blue-600 text-white text-[10px] font-black w-full py-2 rounded-xl active:scale-95 transition animate-pulse shadow-[0_0_10px_rgba(37,99,235,0.5)]"; 
            updatePowerBar(0) 
            document.getElementById('powerBarText').innerText = "OFF";
            document.getElementById('powerLabel').innerText = "POWER"; 
        }

        let editorBPM = 128; 
        let editorTapTimes = []; 
        let editorTapTimeout = null; 

        let stateHistory = [];
        let stateIndex = -1;
        let isNavigatingHistory = false;

        function updateBeatDuration() {
            let dur = 60 / editorBPM;
            document.documentElement.style.setProperty('--beat-duration', dur + 's');
        }

       function setActiveScaleBtn(btn) {
            if (!btn) return;
            let scaleText = btn.innerText.trim();
            
            const activeClasses = ['bg-green-700', 'text-white', 'border-green-500', 'font-black', 'active:bg-green-600', 'shadow-[0_0_8px_rgba(34,197,94,0.6)]', 'sync-blink'];
            const inactiveClasses = ['bg-gray-800', 'text-green-400', 'border-gray-600', 'font-bold', 'active:bg-gray-700'];

            document.querySelectorAll('.room-btn, button[onclick*="setActiveScaleBtn"]').forEach(el => {
                if (el.innerText.trim() === scaleText) {
                    el.classList.remove(...inactiveClasses);
                    el.classList.add(...activeClasses);
                } else {
                    el.classList.remove(...activeClasses);
                    el.classList.add(...inactiveClasses);
                }
            });
        }

        function clearActiveScaleBtns() {
            document.querySelectorAll('.sync-blink').forEach(el => el.classList.remove('sync-blink'));
        }

        function saveState() {
            if (isNavigatingHistory) return;
            stateHistory = stateHistory.slice(0, stateIndex + 1);
            stateHistory.push(JSON.stringify(clips));
            stateIndex = stateHistory.length - 1;
        }

        function undoState() {
            if (stateIndex > 0) {
                stateIndex--;
                isNavigatingHistory = true;
                clips = JSON.parse(stateHistory[stateIndex]);
                renderClips();
                updateSelectedClipUI();
                isNavigatingHistory = false;
            }
        }

        function redoState() {
            if (stateIndex < stateHistory.length - 1) {
                stateIndex++;
                isNavigatingHistory = true;
                clips = JSON.parse(stateHistory[stateIndex]);
                renderClips();
                updateSelectedClipUI();
                isNavigatingHistory = false;
            }
        }

        function updateSelectedClipUI() {
            if(selectedClipId) {
                const c = clips.find(x => x.id === selectedClipId);
                if(c) {
                    document.getElementById('cBright').value = c.bright; 
                    document.getElementById('cFX').value = c.fx;
                    updateMirrorUI(c.mirror); renderLEDGrid(); renderColorBuilderSlots();
                } else {
                    selectedClipId = null; 
                    document.getElementById('editorPanel').style.opacity = "0.3";
                    document.getElementById('editorPanel').style.pointerEvents = "none";
                }
            }
        }

       let bgPatterns = Array.from({length: 60}, (_, i) => ({ id: i, code: "" }));
        let fgPatterns = Array.from({length: 60}, (_, i) => ({ id: i, code: "" }));
        let spPatterns = Array.from({length: 60}, (_, i) => ({ id: i, code: "" }));
        
        let clips = []; 
        let activeLayer = 'BG'; 
        let activeIdxBG = -1;
        let activeIdxFG = -1;
        let activeIdxSP = -1;
        
        let selectedClipId = null; let selectedIdx = -1;
        let playheadTime = 0; let isPlaying = false;
        let playInterval, startAnimateTime;
        let currentLoopLimit = 1.0; let pxPerSec = 100;
        let isFollowingPlayhead = false;
        
        let sortableBG = null;
        let sortableFG = null;
        let sortableSP = null;
        let isDraggingPad = false;

        let activeColorIndex = -1; 
        
        function compressLEDs(targetStr) {
            if (!targetStr || targetStr === 'a') return 'a';
            let nums = targetStr.match(/\d+/g);
            if (!nums) return targetStr;
            
            nums = [...new Set(nums.map(Number))].sort((a, b) => a - b);
            let result = "";
            let start = nums[0];
            let end = nums[0];

            for (let i = 1; i < nums.length; i++) {
                if (nums[i] === end + 1) {
                    end = nums[i];
                } else {
                    result += (start === end) ? `<${start}>` : `<${start}-${end}>`;
                    start = nums[i];
                    end = nums[i];
                }
            }
            result += (start === end) ? `<${start}>` : `<${start}-${end}>`;
            return result;
        }

        function expandLEDs(compressedStr) {
            if (!compressedStr || compressedStr === 'a') return 'a';
            let result = "";
            let blocks = compressedStr.match(/<[^>]+>/g); 
            if (!blocks) return compressedStr;
            
            blocks.forEach(block => {
                let inner = block.replace(/<|>/g, '');
                if (inner.includes('-')) {
                    let parts = inner.split('-');
                    let start = parseInt(parts[0]);
                    let end = parseInt(parts[1]);
                    for (let i = start; i <= end; i++) {
                        result += `<${i}>`;
                    }
                } else {
                    result += `<${inner}>`;
                }
            });
            return result;
        }

        const colorMap = { 'bl': '#0000FF', 're': '#FF0000', 'gr': '#00FF00', 'ye': '#FFFF00', 'wh': '#FFFFFF', 'pu': '#8000FF', 'aq': '#00FFFF', 'or': '#FF8000', 'pk': '#FF00FF', 'cy': '#00FFFF' };
        const fxNames = { o: 'STATIC', u: 'FADE UP', f: 'FADE OUT', s: 'STROBE', b: 'BLINK', w: 'WAVE', r: 'RANDOM', p: 'PULSE', d: 'DROP', z: 'ZIGZAG', h: 'H-STROBE', v: 'MT. FUJI' };

       function remoteEditAction(layer, actionCallback, saveToFlash = true) {
            let activeLiveIdx = (layer === 'BG') ? activeIdxBG : (layer === 'FG' ? activeIdxFG : activeIdxSP);
            if (activeLiveIdx === -1) return; 
            
            let prevLayer = activeLayer;
            let prevIdx = selectedIdx;

            activeLayer = layer;
            selectedIdx = activeLiveIdx;
            clips = [];
            
            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
            let rawCode = patterns[activeLiveIdx].code || "";
            let brackets = rawCode.match(/m?\(([^)]+)\)/g);
            if (brackets) {
                brackets.forEach((bracket, i) => {
                    let m = bracket.startsWith('m');
                    let content = bracket.replace('m','').replace('(','').replace(')','').split(',');
                    if(content.length >= 4) {
                        let s_val, b_val;
                        if (content[0].length === 5) {
                            s_val = parseInt(content[0].substring(0,3))/100;
                            b_val = parseInt(content[0].substring(3,5));
                        } else {
                            s_val = parseInt(content[0].substring(0,2))/10;
                            b_val = parseInt(content[0].substring(2,4));
                        }
                        
                        let d_val;
                        if (content[3].length >= 6) {
                            d_val = Math.max(0.01, parseInt(content[3].substring(1,4))/100);
                        } else {
                            d_val = Math.max(0.1, parseInt(content[3].substring(1,3))/10);
                        }

                        clips.push({ 
                            id: Date.now() + i, 
                            start: s_val, 
                            bright: b_val, 
                            target: expandLEDs(content[1]),
                            color: content[2], 
                            fx: content[3].charAt(0), 
                            duration: d_val, 
                            loop: 1, mirror: m, track: i % 8 
                        });
                    }
                });
            }
            
            actionCallback();
            
            let newCode = generateCodeStr();
            patterns[activeLiveIdx].code = newCode;
            updatePadsVisuals(layer);
            
            if(characteristic) {
                let physicalId = patterns[activeLiveIdx].id; 
                let prefix = (layer === 'BG') ? 'SB' : (layer === 'FG' ? 'SF' : 'SSP');
                let playCmd = (layer === 'BG') ? '5' : (layer === 'FG' ? 'FG:5' : 'SP:5');
                
                // สลับคิว! ยิงคำสั่งเล่นไฟ (Play) ให้พุ่งไปเข้า ESP32 ก่อนเลยทันที
                safeBleWrite(playCmd + newCode); 
                
                // ถ้าอนุญาตให้เซฟ ค่อยยิงคำสั่งเซฟตามหลัง (ลดคอขวด)
                if (saveToFlash) {
                    safeBleWrite(`${prefix}${physicalId}:${newCode}`, 'withResponse');
                }
            }

            activeLayer = prevLayer;
            selectedIdx = prevIdx;
            clips = []; 
        }
        let endFadeTime = 5; // ค่าเริ่มต้นให้ค่อยๆ ดับใน 5 วินาที
        let endBtnClickTimer = null;
        
        function triggerEndSong() {
            if (endBtnClickTimer) {
                // ถ้ากดซ้ำภายใน 300ms (ดับเบิลคลิก) -> ยกเลิกการส่งคำสั่งหยุด แล้วเปิดหน้าต่างตั้งค่าแทน
                clearTimeout(endBtnClickTimer);

       // --- เริ่มระบบ Auto Beat Detection (หูทิพย์จับจังหวะเบส) ---
        let isAutoBeatActive = false;
        let autoBeatStream = null;
        let autoBeatAnimFrame = null;
        let lastAutoBeatTime = 0;

        async function toggleAutoBeat() {
            const bpmDisplay = document.getElementById('liveBpmDisplay');
            
            if (isAutoBeatActive) {
                isAutoBeatActive = false;
                if (autoBeatStream) autoBeatStream.getTracks().forEach(t => t.stop());
                if (autoBeatAnimFrame) cancelAnimationFrame(autoBeatAnimFrame);
                
                bpmDisplay.classList.remove('animate-pulse', 'text-red-400', 'border-red-500', 'shadow-[0_0_15px_red]');
                bpmDisplay.classList.add('text-white', 'border-gray-700');
                console.log("Auto Beat: ❌ OFF");
                return;
            }

            try {
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                
                // สั่งปิดระบบปรับเสียงอัตโนมัติของเบราว์เซอร์ เพื่อรับเสียงสดๆ (Raw Audio)
                const constraints = {
                    audio: {
                        echoCancellation: false,
                        autoGainControl: false,
                        noiseSuppression: false
                    }
                };
                
                autoBeatStream = await navigator.mediaDevices.getUserMedia(constraints);
                const source = audioCtx.createMediaStreamSource(autoBeatStream);
                
                // กรองเฉพาะเบสหนักๆ (< 150Hz)
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150; 
                
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; 
                // เพิ่มความไวในการตอบสนอง
                analyser.smoothingTimeConstant = 0.2; 
                
                source.connect(filter);
                filter.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isAutoBeatActive = true;
                console.log("Auto Beat: 🟢 ON (Listening raw audio...)");
                
                bpmDisplay.classList.remove('text-white', 'border-gray-700');
                bpmDisplay.classList.add('text-red-400', 'animate-pulse', 'border-red-500', 'shadow-[0_0_15px_red]');
                
                function detectBeat() {
                    if (!isAutoBeatActive) return;
                    
                    analyser.getByteFrequencyData(dataArray);
                    
                    // หา "จุดที่เสียงกระแทกแรงที่สุด (Peak Volume)" ในเสี้ยววินาทีนั้น
                    // ค่าสูงสุดที่เป็นไปได้คือ 255 
                    let peakVolume = 0;
                    for(let i=0; i<dataArray.length; i++) { 
                        if(dataArray[i] > peakVolume) peakVolume = dataArray[i]; 
                    }
                    
                   // ปรับเกณฑ์หนีเสียงพัดลม! (ค่าเต็มหลอดคือ 255)
                    // ดันกำแพงขึ้นไปที่ 235 ให้มันจับเฉพาะเสียง "ตึ๊บ" ที่กระแทกแรงจริงๆ เท่านั้น
                    if (peakVolume > 235) { 
                        let now = Date.now();
                        // เพิ่มเวลาหน่วงเป็น 300ms (บล็อกความเร็วสูงสุดไว้ที่ไม่เกิน 200 BPM) ป้องกันอาการเลขไหล
                        if (now - lastAutoBeatTime > 300) {
                            lastAutoBeatTime = now;
                            
                            remoteTapTempo(null);
                            
                            bpmDisplay.style.transform = 'scale(1.6)';
                            setTimeout(() => bpmDisplay.style.transform = 'none', 100);
                        }
                    }
                    autoBeatAnimFrame = requestAnimationFrame(detectBeat);
                }
                detectBeat();
                
            } catch (err) {
                console.error("Auto Beat Error:", err);
                alert("เกิดข้อผิดพลาดในการเปิดไมค์! โปรดตรวจสอบว่าเบราว์เซอร์อนุญาตให้ใช้ไมค์หรือไม่ (" + err.message + ")");
            }
        }

       function remoteTapTempo(e) {
            if(e) e.preventDefault();
            const now = Date.now();
            
            // ป้องกันจังหวะเพี้ยน: ถ้าทิ้งช่วงไม่ได้เคาะนานเกิน 2 วินาที (ช้ากว่า 30 BPM) ให้ล้างค่าความจำเดิมทิ้งไปเลย
            if (editorTapTimes.length > 0 && now - editorTapTimes[editorTapTimes.length - 1] > 2000) {
                editorTapTimes = [];
            }
            
            editorTapTimes.push(now); 
            // เพิ่มความจำจาก 5 เป็น 9 ครั้ง เพื่อให้มีข้อมูลกรองเยอะขึ้น
            if (editorTapTimes.length > 9) editorTapTimes.shift();
            
            if (editorTapTimes.length > 2) { // ต้องมีอย่างน้อย 3 จังหวะถึงจะคำนวณได้นิ่ง
                let diffs = [];
                for (let i = 1; i < editorTapTimes.length; i++) {
                    diffs.push(editorTapTimes[i] - editorTapTimes[i - 1]);
                }
                
                // ทีเด็ด! ใช้สูตร "มัธยฐาน (Median)" เรียงลำดับความห่างแล้วหยิบตัวตรงกลางมาใช้
                // วิธีนี้จะโยนจังหวะที่ "เบิ้ล(ไวไป)" หรือ "หลุด(ช้าไป)" ทิ้งไปเลยแบบอัตโนมัติ!
                diffs.sort((a, b) => a - b);
                let mid = Math.floor(diffs.length / 2);
                let medianDiff = diffs.length % 2 !== 0 ? diffs[mid] : (diffs[mid - 1] + diffs[mid]) / 2;
                
                let rawBpm = 60000 / medianDiff;
                let bpm = Math.round(rawBpm * 2) / 2; 
                
                if (bpm > 30 && bpm <= 200) {
                    editorBPM = bpm;
                    document.getElementById('editorBpmDisplay').innerText = editorBPM;
                    document.getElementById('liveBpmDisplay').innerText = editorBPM;
                    
                    updateBeatDuration(); 

                    if (editorTapTimeout) clearTimeout(editorTapTimeout);
                    
                    // ตั้งเวลาหน่วงตายตัวที่ 800ms (0.8วิ) พอหยุดเคาะปุ๊บ ไฟเปลี่ยนปั๊บ
                    editorTapTimeout = setTimeout(() => {
                        if(characteristic) {
                            let currentBrt = parseFloat(document.getElementById('bgBrightSlider').value);
                            safeBleWrite("B:" + (currentBrt * 0.8).toFixed(2));
                            setTimeout(() => { safeBleWrite("B:" + currentBrt.toFixed(2)); }, 150);
                        }

    if (activeIdxBG !== -1) {
                            remoteEditAction('BG', () => setRoomScale(getBeatsFromSlider(sclDragBaseVal)), false);
                            throttledBleWrite('speedBG', "T1.00", 'withoutResponse', 50);
                        }
                        if (activeIdxFG !== -1) {
                            remoteEditAction('FG', () => setRoomScale(getBeatsFromSlider(sclDragBaseValFG)), false);
                            throttledBleWrite('speedFG', "FGT1.00", 'withoutResponse', 50);
                        }
                        if (activeIdxSP !== -1) {
                            remoteEditAction('SP', () => setRoomScale(getBeatsFromSlider(sclDragBaseValSP)), false);
                            throttledBleWrite('speedSP', "SPT1.00", 'withoutResponse', 50);
                        }
                    }, 800);
                }
            }
            const btn = document.getElementById('bgTapBtn');
            if (btn) {
                btn.style.transform = 'scale(0.90)';
                btn.style.backgroundColor = 'white';
                btn.style.color = '#ea580c';
                setTimeout(() => { btn.style.transform = 'none'; btn.style.backgroundColor = '#ea580c'; btn.style.color = 'white'; }, 100);
            }
        }

            if (maxT > 0) {

                let nearestBeat = Math.round(maxT / beatTime) * beatTime;

        function setRoomScale(beats) {

            clips.forEach(c => { let end = c.start + c.duration; if (end > maxT) maxT = end; });
            
            if (maxT > 0) {
                let beatTime = 60 / editorBPM;

                let scaleRatio = targetTime / maxT;
                
                clips.forEach(c => { 
                    c.start = c.start * scaleRatio;

        function applyPastedCode() {
            const rawCode = document.getElementById('codeTextArea').value.trim();
            if (!rawCode) { closeCodeModal(); return; }
            
            clips = [];
            let brackets = rawCode.match(/m?\(([^)]+)\)/g);
            if (brackets) {
                brackets.forEach((bracket, i) => {
                    let m = bracket.startsWith('m');
                    let content = bracket.replace('m','').replace('(','').replace(')','').split(',');
                    if(content.length >= 4) {
                        let s_val, b_val;
                        if (content[0].length === 5) {
                            s_val = parseInt(content[0].substring(0,3))/100;
                            b_val = parseInt(content[0].substring(3,5));
                        } else {
                            s_val = parseInt(content[0].substring(0,2))/10;
                            b_val = parseInt(content[0].substring(2,4));
                        }
                        
                        let d_val;
                        if (content[3].length >= 6) {
                            d_val = Math.max(0.01, parseInt(content[3].substring(1,4))/100);
                        } else {
                            d_val = Math.max(0.1, parseInt(content[3].substring(1,3))/10);
                        }

                        clips.push({ 
                            id: Date.now() + i, 
                            start: s_val, 
                            bright: b_val, 
                            target: expandLEDs(content[1]), 
                            color: content[2], 
                            fx: content[3].charAt(0), 
                            duration: d_val, 
                            loop: 1, mirror: m, track: i % 8 
                        });
                    }
                });
            }
            
            stateHistory = []; stateIndex = -1; saveState();
            renderClips();
            updateLoopLine();
            fitToScreen();
            closeCodeModal();
            handleBack(); 
            alert("แปลงโค้ดกลับเป็นลายไฟสำเร็จ!");
        }
let sclDragBaseVal = 3;

        function getBeatsFromSlider(v) {
            if (v <= 1) return 8 - v * 2;
            if (v <= 2) return 6 - (v - 1) * 2;
            if (v <= 3) return 4 - (v - 2) * 2;
            if (v <= 4) return 2 - (v - 3) * 1;
            if (v <= 5) return 1 - (v - 4) * 0.5;
            return 0.5 - (v - 5) * 0.25;
        }
            // ฟังก์ชันสับเปลี่ยน Room ทั้ง 3 เลเยอร์พร้อมกัน (Master Shift) ลื่นๆ ไม่สะดุด
        function globalShiftRoom(direction) {
            // direction: -1 (ลดความเร็วไปทางซ้าย), 1 (เพิ่มความเร็วไปทางขวา)
            
            const shiftLayer = (layer, sliderId, btnClass, activeBaseColor, activeBorderColor) => {
                let baseVal = (layer === 'BG') ? sclDragBaseVal : (layer === 'FG' ? sclDragBaseValFG : sclDragBaseValSP);
                let currentIdx = Math.round(baseVal);
                let newIdx = Math.max(0, Math.min(6, currentIdx + direction));
                
                if(newIdx === currentIdx) return; // ตันขอบแล้ว ไม่ขยับต่อ

                // 1. อัปเดตค่าความจำ
                if (layer === 'BG') sclDragBaseVal = newIdx;
                else if (layer === 'FG') sclDragBaseValFG = newIdx;
                else if (layer === 'SP') sclDragBaseValSP = newIdx;
                
                // 2. อัปเดตแถบสไลเดอร์
                document.getElementById(sliderId).value = newIdx;
                
                // 3. เปลี่ยนสีปุ่มที่ถูกเลือก (สลับ UI)
                let btns = document.querySelectorAll('.' + btnClass);
                btns.forEach((btn, idx) => {
                    if (idx === newIdx) {
                        btn.className = `${btnClass} ${activeBaseColor} text-white py-1 rounded-lg border ${activeBorderColor} text-[11px] font-black transition shadow-[0_0_8px_rgba(255,255,255,0.4)] sync-blink${layer==='BG'?'':'-'+layer.toLowerCase()}`;
                    } else {
                        btn.className = `${btnClass} bg-gray-800 ${layer==='BG'?'text-green-400':(layer==='FG'?'text-blue-400':'text-pink-400')} py-1 rounded-lg border border-gray-600 text-[11px] font-bold active:bg-gray-700 transition`;
                    }
                });
                
                // 4. สั่งบอร์ดทำงานแบบลัดคิว (ข้ามการบันทึก)
                let targetBeats = getBeatsFromSlider(newIdx);
                remoteEditAction(layer, () => setRoomScale(targetBeats), false);
                let cmdPrefix = (layer === 'BG') ? 'speedBG' : (layer === 'FG' ? 'speedFG' : 'speedSP');
                let tCmd = (layer === 'BG') ? 'T1.00' : (layer === 'FG' ? 'FGT1.00' : 'SPT1.00');
                throttledBleWrite(cmdPrefix, tCmd, 'withoutResponse', 50);
            };

            // สั่งรันเรียงตัวทั้ง 3 เลเยอร์
            shiftLayer('BG', 'liveSpeedSlider', 'room-btn', 'bg-green-700', 'border-green-500');
            shiftLayer('FG', 'liveSpeedSliderFG', 'room-btn-fg', 'bg-blue-700', 'border-blue-500');
            shiftLayer('SP', 'liveSpeedSliderSP', 'room-btn-sp', 'bg-pink-700', 'border-pink-500');
            
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function loadPatternOrder() {
            function loadForLayer(key, patternsArray) {
                let savedOrder = localStorage.getItem(key);
                if (savedOrder) {
                    let orderArr = savedOrder.split(',').map(Number);
                    if (orderArr.length > 0) {
                        let newPatterns = [];
                        orderArr.forEach(id => {
                            let p = patternsArray.find(x => x.id === id);
                            if(p) newPatterns.push(p);
                        });
                        // เติมปุ่มที่อาจตกหล่นไป (กรณีมีการเปลี่ยนจำนวนปุ่ม)
                        patternsArray.forEach(p => {
                            if(!newPatterns.includes(p)) newPatterns.push(p);
                        });
                        return newPatterns;
                    }
                }
                return patternsArray;
            }

            bgPatterns = loadForLayer('padOrderBG', bgPatterns);
            fgPatterns = loadForLayer('padOrderFG', fgPatterns);
            spPatterns = loadForLayer('padOrderSP', spPatterns);
        }

        function savePatternOrder(layer) {
            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
            let orderStr = patterns.map(p => p.id).join(',');
            let key = (layer === 'BG') ? 'padOrderBG' : (layer === 'FG' ? 'padOrderFG' : 'padOrderSP');
            localStorage.setItem(key, orderStr);
            
            if(characteristic) {
                let prefix = (layer === 'BG') ? "OBG:" : (layer === 'FG' ? "OFG:" : "OSP:");
                safeBleWrite(prefix + orderStr, 'withResponse');
            }
        }

        function updatePowerBar(percent, raw = 0) {
            const fill = document.getElementById('powerBarFill');
            const text = document.getElementById('powerBarText');
            const label = document.getElementById('powerLabel');
            
            if(fill && text) {
                fill.style.width = percent + '%';
                text.innerText = percent + '%';
                
                if (label) {
                    label.innerText = raw > 0 ? 'RAW: ' + raw : 'POWER';
                }

                if(percent >= 80) fill.style.backgroundColor = '#22c55e'; 
                else if(percent >= 40) fill.style.backgroundColor = '#f59e0b'; 
                else fill.style.backgroundColor = '#ef4444'; 
            }
        }

        document.getElementById('connectBtn').onclick = async () => {
            const btn = document.getElementById('connectBtn');
            if(device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'PocketDJ-' }], optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"] });
                device.addEventListener('gattserverdisconnected', onDisconnected);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
                characteristic = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");
                btn.innerText = "ONLINE"; 
                btn.className = "bg-green-500 text-black text-[10px] font-black w-full py-2 rounded-xl shadow-[0_0_15px_#00e676] transition";
                await characteristic.startNotifications();
                
                updatePowerBar(100);

               characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let chunk = new TextDecoder().decode(e.target.value);
                    bleRxBuffer += chunk;
                    let lines = bleRxBuffer.split('\n');
                    bleRxBuffer = lines.pop(); // เก็บส่วนที่ยังไม่จบไว้รอรอบหน้า

                    lines.forEach(val => {
                        val = val.trim();
                        if (!val) return;
                        
if (val === "DONE_ALL") {
                            // --- พอบอร์ดบอกว่าจบแล้ว ค่อยดึงความจำเก่ามาเล่น ---
                            let savedBG = parseInt(localStorage.getItem('lastActiveBG'));
                            if (!isNaN(savedBG) && savedBG >= 0 && savedBG < 60 && bgPatterns[savedBG] && bgPatterns[savedBG].code) {
                                playFX(savedBG, null, 'BG');
                            }
                            let savedFG = parseInt(localStorage.getItem('lastActiveFG'));
                            if (!isNaN(savedFG) && savedFG >= 0 && savedFG < 60 && fgPatterns[savedFG] && fgPatterns[savedFG].code) {
                                playFX(savedFG, null, 'FG');
                            }
                            let savedSP = parseInt(localStorage.getItem('lastActiveSP'));
                            if (!isNaN(savedSP) && savedSP >= 0 && savedSP < 60 && spPatterns[savedSP] && spPatterns[savedSP].code) {
                                playFX(savedSP, null, 'SP');
                            }
                        }
                        else if (val.startsWith("PWR:")) {
                            let parts = val.substring(4).split(':');
                            let percent = parseInt(parts[0]);
                            let raw = parts.length > 1 ? parseInt(parts[1]) : 0;
                            updatePowerBar(percent, raw);

                            const warningBox = document.getElementById('voltageWarning');
                            const warningText = document.getElementById('voltageText');
                            
                            if (warningBox && warningText && raw > 0) {
                                if (!isLowVoltageAlertLocked && raw <= 3400) {
                                    isLowVoltageAlertLocked = true;
                                } else if (isLowVoltageAlertLocked && raw >= 3800) {
                                    isLowVoltageAlertLocked = false;
                                }

                                if (isLowVoltageAlertLocked) {
                                    warningBox.classList.remove('hidden'); 
                                    warningText.innerText = `RAW: ${raw}`;
                                    
                                    let nowMs = Date.now();
                                    if (nowMs - lastLowVoltAlertTime > 5000) {
                                        lastLowVoltAlertTime = nowMs;
                                        playAlertBeep(); 
                                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]); 
                                    }
                                } else {
                                    warningBox.classList.add('hidden'); 
                                }
                            }
                        }
                        else if (val.startsWith("DB")) {
                            let sep1 = val.indexOf(':', 2);
                            let sep2 = val.indexOf(':', sep1 + 1);
                            if (sep1 !== -1 && sep2 !== -1) {
                                let id = parseInt(val.substring(2, sep1));
                                let code = val.substring(sep2 + 1);
                                let pat = bgPatterns.find(x => x.id === id);
                                if(pat) { pat.code = code; updatePadsVisuals('BG'); }
                            }
                        } 
                        else if (val.startsWith("DF")) {
                            let sep1 = val.indexOf(':', 2);
                            let sep2 = val.indexOf(':', sep1 + 1);
                            if (sep1 !== -1 && sep2 !== -1) {
                                let id = parseInt(val.substring(2, sep1));
                                let code = val.substring(sep2 + 1);
                                let pat = fgPatterns.find(x => x.id === id);
                                if(pat) { pat.code = code; updatePadsVisuals('FG'); }
                            }
                        } 
                        else if (val.startsWith("DSP")) {
                            let sep1 = val.indexOf(':', 3);
                            let sep2 = val.indexOf(':', sep1 + 1);
                            if (sep1 !== -1 && sep2 !== -1) {
                                let id = parseInt(val.substring(3, sep1));
                                let code = val.substring(sep2 + 1);
                                let pat = spPatterns.find(x => x.id === id);
                                if(pat) { pat.code = code; updatePadsVisuals('SP'); }
                            }
                        } 
                        else if (val.startsWith("OBG:")) {
                            let orderStr = val.substring(4);
                            if(orderStr) {
                                localStorage.setItem('padOrderBG', orderStr);
                                loadPatternOrder();
                                renderLayerPads('BG');
                            }
                        } 
                        else if (val.startsWith("OFG:")) {
                            let orderStr = val.substring(4);
                            if(orderStr) {
                                localStorage.setItem('padOrderFG', orderStr);
                                loadPatternOrder();
                                renderLayerPads('FG');
                            }
                        } 
                        else if (val.startsWith("OSP:")) {
                            let orderStr = val.substring(4);
                            if(orderStr) {
                                localStorage.setItem('padOrderSP', orderStr);
                                loadPatternOrder();
                                renderLayerPads('SP');
                            }
                        }
                    });
                });
                await safeBleWrite("GET_ALL", 'withResponse');
            } catch (e) { alert("BT Error: " + e.message); }
        };

        function renderLayerPads(layer) {
            const gridId = layer === 'BG' ? 'padGridBG' : (layer === 'FG' ? 'padGridFG' : 'padGridSP');
            const grid = document.getElementById(gridId);
            
            if (!grid) {
                throw new Error("หากล่อง " + gridId + " ไม่เจอ กรุณาก๊อปปี้โค้ด HTML มาให้ครบถ้วนครับ!");
            }

            grid.innerHTML = '';
            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
            let activeIdx = (layer === 'BG') ? activeIdxBG : (layer === 'FG' ? activeIdxFG : activeIdxSP);

            patterns.forEach((p, index) => {
                const btn = document.createElement('div');
                btn.className = `pad-btn ${p.code ? 'has-code' : ''}`;
                
                if (index === activeIdx) btn.classList.add('playing');
                if(!p.code) { const hue = (p.id * 6) % 360; btn.style.backgroundColor = `hsl(${hue}, 30%, 15%)`; }
                btn.innerHTML = `<span class="text-lg font-black pad-num text-white/80">${p.id + 1}</span>`;
                
                let clickTimer = null;
                btn.addEventListener('click', () => {
                    if (isDraggingPad) return;
                    
                    const currentVisualIndex = patterns.indexOf(p);
                    if (clickTimer) {
                        clearTimeout(clickTimer); clickTimer = null;
                        openPopup(currentVisualIndex, layer); 
                    } else {
                        playFX(currentVisualIndex, btn, layer); 
                        clickTimer = setTimeout(() => { clickTimer = null; }, 300);
                    }
                });
                grid.appendChild(btn);
            });
            setupSortable(layer);
            updatePadsVisuals(layer); 
        }

        function renderPads() {
            loadPatternOrder(); 
            renderLayerPads('BG');
            renderLayerPads('FG');
            renderLayerPads('SP');
        }

        function setupSortable(layer) {
            try {
                if (typeof Sortable === 'undefined') return;

                const gridId = layer === 'BG' ? 'padGridBG' : (layer === 'FG' ? 'padGridFG' : 'padGridSP');
                const grid = document.getElementById(gridId);
                if (!grid) return;

                let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
                
                const config = {
                    animation: 150, delay: 250, delayOnTouchOnly: false, touchStartThreshold: 5,
                    forceFallback: true, fallbackClass: "sortable-drag", fallbackOnBody: true,
                    onStart: () => { 
                        isDraggingPad = true; 
                        if (window.navigator.vibrate) window.navigator.vibrate(30); 
                    },
                    onEnd: (evt) => {
                        const item = patterns.splice(evt.oldIndex, 1)[0];
                        patterns.splice(evt.newIndex, 0, item);
                        if(layer === 'BG') {
                            if(activeIdxBG === evt.oldIndex) activeIdxBG = evt.newIndex;
                            else if(activeIdxBG === evt.newIndex) activeIdxBG = evt.oldIndex;
                        } else if(layer === 'FG') {
                            if(activeIdxFG === evt.oldIndex) activeIdxFG = evt.newIndex;
                            else if(activeIdxFG === evt.newIndex) activeIdxFG = evt.oldIndex;
                        } else {
                            if(activeIdxSP === evt.oldIndex) activeIdxSP = evt.newIndex;
                            else if(activeIdxSP === evt.newIndex) activeIdxSP = evt.oldIndex;
                        }
                        // นำ 3 บรรทัดนี้ไปครอบไว้ด้วย setTimeout เพื่อรอให้แอนิเมชันปล่อยนิ้วทำงานเสร็จก่อน ค่อยล้างหน้าจอ
                        setTimeout(() => {
                            savePatternOrder(layer); 
                            renderLayerPads(layer); 
                            isDraggingPad = false;
                        }, 50);
                    }
                };

                if(layer === 'BG') {
                    if (sortableBG) sortableBG.destroy();
                    sortableBG = new Sortable(grid, config);
                } else if(layer === 'FG') {
                    if (sortableFG) sortableFG.destroy();
                    sortableFG = new Sortable(grid, config);
                } else {
                    if (sortableSP) sortableSP.destroy();
                    sortableSP = new Sortable(grid, config);
                }
            } catch (err) {}
        }

        function updatePadsVisuals(layer) {
            const gridId = layer === 'BG' ? 'padGridBG' : (layer === 'FG' ? 'padGridFG' : 'padGridSP');
            const grid = document.getElementById(gridId);
            if (!grid) return;

            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
            let activeIdx = (layer === 'BG') ? activeIdxBG : (layer === 'FG' ? activeIdxFG : activeIdxSP);
            const btns = grid.children;
            patterns.forEach((p, index) => {
                const btn = btns[index];
                if (!btn) return;
                if(p.code) { btn.classList.add('has-code'); btn.style.backgroundColor = ""; } 
                else { btn.classList.remove('has-code'); const hue = (p.id * 6) % 360; btn.style.backgroundColor = `hsl(${hue}, 30%, 15%)`; }
                
                if (index === activeIdx) {
                    btn.classList.add('playing', 'sync-blink');
                } else {
                    btn.classList.remove('playing', 'sync-blink');
                }
            });

           const stopBtn = document.getElementById(layer === 'BG' ? 'stopBtnBG' : (layer === 'FG' ? 'stopBtnFG' : 'stopBtnSP'));
           if (stopBtn) {
                if (activeIdx !== -1) {
                    stopBtn.className = "bg-green-600 hover:bg-green-500 text-white font-black text-[10px] py-1 rounded-lg shadow-lg transition";
                } else {
                    stopBtn.className = "bg-red-900/80 hover:bg-red-600 text-white font-black text-[10px] py-1 rounded-lg shadow-lg transition";
                }
            }
        }
       function playFX(idx, btnElement, layer) {

                if (btn) { btn.innerText = "STOP"; btn.classList.replace('bg-blue-600', 'bg-red-600'); }

            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);

                localStorage.setItem('lastActiveBG', idx); 
                
                document.querySelectorAll('#padGridBG .pad-btn').forEach(b => b.classList.remove('playing'));
                if(btnElement) btnElement.classList.add('playing'); 
                updatePadsVisuals('BG'); 

                if(!characteristic || !patterns[idx].code) return;
                
                // ดึงความเร็วล่าสุดไปคำนวณและเล่นเลยทันที โดยข้ามการบันทึก (false)
                let targetBeats = getBeatsFromSlider(sclDragBaseVal);

                document.querySelectorAll('#padGridFG .pad-btn').forEach(b => b.classList.remove('playing'));
                if(btnElement) btnElement.classList.add('playing'); 
                updatePadsVisuals('FG'); 

                if(!characteristic || !patterns[idx].code) return;
                
                // ดึงความเร็วล่าสุดของ FG ไปคำนวณและเล่นเลยทันที โดยข้ามการบันทึก (false)
                let targetBeats = getBeatsFromSlider(sclDragBaseValFG);
                remoteEditAction('FG', () => setRoomScale(targetBeats), false);

                localStorage.setItem('lastActiveSP', idx); 
                
                document.querySelectorAll('#padGridSP .pad-btn').forEach(b => b.classList.remove('playing'));
                if(btnElement) btnElement.classList.add('playing'); 
                updatePadsVisuals('SP'); 

                if(!characteristic || !patterns[idx].code) return;
                
                // ดึงความเร็วล่าสุดของ SP ไปคำนวณและเล่นเลยทันที โดยข้ามการบันทึก (false)
                let targetBeats = getBeatsFromSlider(sclDragBaseValSP);
                remoteEditAction('SP', () => setRoomScale(targetBeats), false);

        function openPopup(idx, layer) {
            clearActiveScaleBtns(); 
            window.location.hash = 'edit'; 
            activeLayer = layer; selectedIdx = idx; clips = []; activeColorIndex = -1;
            
            document.getElementById('modal').classList.remove('hidden');

            document.getElementById('editorBpmDisplay').innerText = editorBPM;
            editorTapTimes = [];

            let patterns = (layer === 'BG') ? bgPatterns : (layer === 'FG' ? fgPatterns : spPatterns);
            let rawCode = patterns[idx].code || "";
            let brackets = rawCode.match(/m?\(([^)]+)\)/g);
            if (brackets) {
                brackets.forEach((bracket, i) => {
                    let m = bracket.startsWith('m');
                    let content = bracket.replace('m','').replace('(','').replace(')','').split(',');
                    if(content.length >= 4) {
                        let s_val, b_val;
                        if (content[0].length === 5) {
                            s_val = parseInt(content[0].substring(0,3))/100;
                            b_val = parseInt(content[0].substring(3,5));
                        } else {
                            s_val = parseInt(content[0].substring(0,2))/10;
                            b_val = parseInt(content[0].substring(2,4));
                        }
                        
                        let d_val;
                        if (content[3].length >= 6) {
                            d_val = Math.max(0.01, parseInt(content[3].substring(1,4))/100);
                        } else {
                            d_val = Math.max(0.1, parseInt(content[3].substring(1,3))/10);
                        }

                        clips.push({ 
                            id: Date.now() + i, 
                            start: s_val, 
                            bright: b_val, 
                            target: expandLEDs(content[1]), 
                            color: content[2], 
                            fx: content[3].charAt(0), 
                            duration: d_val, 
                            loop: 1, mirror: m, track: i % 8 
                        });
                    }
                });
            }
            
            setTimeout(() => {
                initColors(); 
                updateGridBackground(); 
                renderClips();

        function applySpeedScale(val) {
            let scaleRatio = parseFloat(val);
            if (scaleRatio === 1.0) return; 

            let maxT = 0; 
            clips.forEach(c => { let end = c.start + c.duration; if (end > maxT) maxT = end; });
            
            if (maxT > 0) {
                let beatTime = 60 / editorBPM; 
                let currentBeats = Math.round(maxT / beatTime);
                let targetBeats = currentBeats;
                
                if (scaleRatio > 1.0) targetBeats += 1;
                else if (scaleRatio < 1.0) targetBeats -= 1;
                
                if (targetBeats < 1) targetBeats = 1; 
                
                let actualRatio = (targetBeats * beatTime) / maxT;
                
                clips.forEach(c => { 
                    c.start = c.start * actualRatio; 
                    c.duration = c.duration * actualRatio; 
                });
            }
            
            if (!document.getElementById('modal').classList.contains('hidden')) {
                let slider = document.getElementById('speedSlider');
                if (slider) slider.value = 1.0;
                markUnsaved(); renderClips(); updateCodeMonitor();
                fitToScreen(); 
                restartPlayhead(); 
            } else {
                markUnsaved();
            }

        function renderClips() {
            const area = document.getElementById('trackArea'); area.innerHTML = '';
            clips.forEach(c => {
                const div = document.createElement('div');
                div.id = `clip-${c.id}`; div.className = `light-clip ${selectedClipId === c.id ? 'selected' : ''}`;
                div.style.left = (c.start * pxPerSec) + 'px'; div.style.width = (c.duration * pxPerSec) + 'px'; 
                div.style.top = (c.track * 20) + 'px';
                div.innerText = fxNames[c.fx] || c.fx.toUpperCase();
                
                if (!c.target || c.target === '') { div.style.backgroundColor = '#555555'; div.style.color = '#aaaaaa'; } 
                else if(c.color.includes('2')) {
                    const parts = c.color.split('2');
                    div.style.background = `linear-gradient(to right, ${colorMap[parts[0]] || '#333'}, ${colorMap[parts[1]] || '#333'})`;
                } else { div.style.backgroundColor = colorMap[c.color] || '#555'; }
                
                area.appendChild(div);
                
                interact(div).draggable({
                    listeners: {
                        start(e) { c.tempY = c.track * 20; c.tempStart = c.start; },
                        move(e) {
                            c.tempStart += e.dx / pxPerSec;
                            let beatTime = 60 / editorBPM; 
                            let closestBeat = Math.round(c.tempStart / beatTime) * beatTime;
                            let threshold = 15 / pxPerSec; 
                            if (Math.abs(c.tempStart - closestBeat) <= threshold) {
                                c.start = closestBeat; 
                            } else {
                                c.start = c.tempStart; 
                            }
                            c.start = Math.max(0, c.start);
                            c.tempY += e.dy; c.track = Math.max(0, Math.min(7, Math.round(c.tempY / 20))); 
                            e.target.style.left = (c.start * pxPerSec) + 'px'; e.target.style.top = (c.track * 20) + 'px';
                            if(!isPlaying) scrubLiveFrame();
                        },
                        end(e) { 
                            c.tempY = undefined; c.tempStart = undefined;
                            markUnsaved(); updateLoopLine(); renderClips(); sendFullCodeToBT(); updateCodeMonitor(); 
                        }
                    }
                }).resizable({ 
                    edges: { right: true, left: true }, 
                    listeners: { 
                        start(e) { c.tempStart = c.start; },
                        move(e) { 
                            let beatTime = 60 / editorBPM;
                            let threshold = 15 / pxPerSec;
                            if(e.edges.left) { 
                                c.tempStart += e.dx / pxPerSec; 
                                let closestBeat = Math.round(c.tempStart / beatTime) * beatTime;
                                c.start = Math.abs(c.tempStart - closestBeat) <= threshold ? closestBeat : c.tempStart;
                                c.start = Math.max(0, c.start); 
                            }
                            let rawDur = e.rect.width / pxPerSec;
                            let closestDur = Math.round(rawDur / beatTime) * beatTime;
                            c.duration = Math.abs(rawDur - closestDur) <= threshold ? Math.max(beatTime/4, closestDur) : rawDur; 
                            c.duration = Math.max(0.01, c.duration); 
                            e.target.style.left = (c.start * pxPerSec) + 'px'; e.target.style.width = (c.duration * pxPerSec) + 'px'; 
                            if(!isPlaying) scrubLiveFrame(); 
                        },
                        end(e) { 
                            c.tempStart = undefined;
                            markUnsaved(); updateLoopLine(); renderClips(); sendFullCodeToBT(); updateCodeMonitor(); 
                        }
                    } 
                }).on('tap', function(event) { selectClip(c.id); })
                  .on('hold', function(event) {
                    selectClip(c.id);
                    let newClip = JSON.parse(JSON.stringify(c));
                    newClip.id = Date.now(); newClip.start += 0.5; newClip.track = Math.min(7, newClip.track + 1); 
                    clips.push(newClip); markUnsaved(); renderClips();
                    if (window.navigator.vibrate) window.navigator.vibrate(50);
                });
            });
            updateLoopLine(); updateCodeMonitor();
        }

            const markers = [7,8,9,10, 18,19,20,21, 29,30,31,32, 37,38,39,40, 48,49,50,51, 59,60,61,62, 68,69,70];
